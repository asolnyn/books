<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0c0c0e">
<meta property="og:title" content="~ asol publication ~">
<meta property="og:description" content="A catalog of published works">
<title>~ asol publication ~</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Baloo+Da+2:wght@500;600;700;800&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

<!--
  ============================================================
  HOW TO EDIT THIS SITE — read this first
  ============================================================
  Nothing in this file needs editing for day-to-day updates.
  Everything lives in separate files:

    data/manifest.json      -> list of which books exist
    data/books/AP-01.json    -> one file per book (title, dates,
                                 price, description, etc.)
    data/contact.json        -> phone numbers, emails, social links,
                                 WhatsApp number, Telegram link
    covers/                  -> cover images
    excerpts/                -> long excerpt text files (optional)
    fonts/                   -> custom font files

  Full instructions are in data/README.md — open that file first.
  ============================================================
-->

<style>
  @font-face {
  font-family: 'Jashir Abhyuday';
  src: url('fonts/Li%20Jashir%20Abhyuday%20Unicode.ttf') format('truetype');
  }
  :root {
    --bg: #0c0c0e;
    --ink: #f4f2ec;
    --muted: #8b8b93;
    --line: rgba(244,242,236,0.12);
    --accent: #e6394a;
    --accent-soft: rgba(230,57,74,0.12);
    --overlay: rgba(0,0,0,0.72);

    --font-bn-display: 'Jashir Abhyuday', sans-serif;
    --font-bn-body: 'Jashir Abhyuday', sans-serif;
    --font-en-display: 'Archivo Black', sans-serif;
    --font-en-sub: 'Space Grotesk', sans-serif;
    --font-en-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  [data-theme="light"] {
    --bg: #f6f4ee;
    --ink: #141414;
    --muted: #6b6b70;
    --line: rgba(20,20,20,0.12);
    --accent: #d62839;
    --accent-soft: rgba(214,40,57,0.10);
    --overlay: rgba(20,20,20,0.55);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-bn-body);
    -webkit-font-smoothing: antialiased;
    transition: background .2s ease, color .2s ease;
  }
  body.lang-en { font-family: var(--font-en-body); }

  a { color: inherit; }
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
  button { font-family: inherit; }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 0 22px 80px;
  }

  header.masthead {
    padding: 40px 0 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    border-bottom: 3px solid var(--ink);
  }

  .brand-name {
    font-family: var(--font-bn-display);
    font-weight: 800;
    font-size: clamp(28px, 6.6vw, 48px);
    line-height: 1;
    letter-spacing: 0.5px;
    text-transform: lowercase;
  }
  body.lang-en .brand-name { font-family: var(--font-en-sub); font-weight: 700; letter-spacing: 0; }

  .brand-sub {
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* Bangla text should never use the mono font's letter-spacing/uppercase —
     Bangla script breaks apart visually when spaced out like English caps do. */
  body.lang-bn .brand-sub,
  body.lang-bn .index-label,
  body.lang-bn .sort-select,
  body.lang-bn .book-code,
  body.lang-bn .contact-bar,
  body.lang-bn #btn-bn,
  body.lang-bn option {
    font-family: var(--font-bn-body);
    letter-spacing: 0;
    text-transform: none;
  }

  .header-controls {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
  }

  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border: 2px dashed var(--line);
    border-radius: 10px;
    transform: rotate(-3deg);
    background: rgba(128,128,128,0.04);
  }
  .lang-toggle button {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font-mono);
    transition: background .15s ease, color .15s ease;
  }
  .lang-toggle button.active { background: var(--accent); color: #fff; }

  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 4px;
    border-radius: 20px;
    border: 1px solid var(--line);
  }
  .theme-toggle button {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 16px;
    border: none;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--font-mono);
  }
  .theme-toggle button.active { background: var(--ink); color: var(--bg); }

  .contact-bar {
    padding: 16px 0 0;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--muted);
    display: flex;
    flex-wrap: wrap;
    gap: 6px 10px;
  }
  .contact-bar strong { color: var(--ink); font-weight: 500; }

  .toolbar {
    margin-top: 40px;
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1 1 220px;
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .search-box input {
    border: none;
    background: transparent;
    outline: none;
    color: var(--ink);
    font-family: var(--font-bn-body);
    font-size: 14px;
    width: 100%;
  }
  body.lang-en .search-box input { font-family: var(--font-en-body); }
  .search-box svg { flex-shrink: 0; opacity: 0.5; }

  .sort-select {
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 10px 12px;
  }

  .index-label {
    margin: 30px 0 8px;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }

  .filter-chips {
    margin-top: 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-chip {
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
  }
  body.lang-bn .filter-chip { font-family: var(--font-bn-body); }
  .filter-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .empty-state {
    padding: 40px 0;
    color: var(--muted);
    font-family: var(--font-mono);
    font-size: 13px;
    text-align: center;
  }

  .book {
    position: relative;
    padding: 34px 0;
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: 74px 1fr;
    gap: 4px 22px;
  }
  .book:last-child { border-bottom: 1px solid var(--line); }

  .book-num-wrap { grid-row: 1 / span 4; padding-top: 4px; }
  .book-num {
    font-family: var(--font-en-display);
    font-size: 44px;
    line-height: 1;
    color: transparent;
    -webkit-text-stroke: 2px var(--muted);
    display: block;
  }
  .book-code {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .book-title-row { cursor: pointer; }
  .book-type {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 8px;
  }
  body.lang-bn .book-type { font-family: var(--font-bn-body); letter-spacing: 0; text-transform: none; }
  .book-title {
    font-family: var(--font-bn-display);
    font-weight: 700;
    font-size: clamp(21px, 4.2vw, 28px);
    line-height: 1.15;
    transition: color .12s ease;
  }
  body.lang-en .book-title { font-family: var(--font-en-sub); font-weight: 700; }
  .book-title-row:hover .book-title { color: var(--accent); }

  .meta-col {
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    justify-content: center;
  }
  .meta-item {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--muted);
  }
  body.lang-bn .meta-item { font-family: var(--font-bn-body); }
  .meta-item b { color: var(--ink); font-weight: 500; }

  .book-top-row {
    margin-top: 16px;
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  .book-top-row .meta-col { margin-top: 0; flex: 1; }

  .cover {
    width: 150px;
    flex-shrink: 0;
    aspect-ratio: 3 / 4;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--line);
    box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    cursor: pointer;
  }
  .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover.placeholder {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-soft);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    text-align: center;
    text-transform: uppercase;
    padding: 6px;
  }
  body.lang-bn .cover.placeholder { font-family: var(--font-bn-body); letter-spacing: 0; text-transform: none; }

  .book-desc {
    font-size: 15px;
    line-height: 1.7;
    color: var(--ink);
    opacity: 0.85;
    max-width: 60ch;
  }

  .book-footer {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .price { font-family: var(--font-mono); font-size: 14px; font-weight: 700; }
  .price .unit { color: var(--muted); font-weight: 400; margin-left: 4px; }
  body.lang-bn .price { font-family: var(--font-bn-body); }

  .buy-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
    background: var(--accent);
    color: #fff;
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 10px 18px;
    border-radius: 6px;
    transition: transform .12s ease, filter .15s ease;
  }
  body.lang-bn .buy-btn { font-family: var(--font-bn-body); letter-spacing: 0; text-transform: none; }
  .buy-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

  .status-pill {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--line);
    padding: 8px 14px;
    border-radius: 20px;
  }
  body.lang-bn .status-pill { font-family: var(--font-bn-body); letter-spacing: 0; text-transform: none; }

  .read-more {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    margin-top: 8px;
    display: inline-block;
  }
  body.lang-bn .read-more { font-family: var(--font-bn-body); }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--overlay);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 50;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 16px;
    max-width: 560px;
    width: 100%;
    max-height: 86vh;
    overflow-y: auto;
    padding: 30px;
    position: relative;
  }

  .modal-back {
    position: absolute;
    top: 16px;
    left: 16px;
    background: none;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 7px 12px;
    border-radius: 8px;
    cursor: pointer;
    z-index: 2;
  }
  body.lang-bn .modal-back { font-family: var(--font-bn-body); }

  .modal-details-btn {
    background: var(--accent-soft);
    color: var(--accent);
    border: none;
    font-family: var(--font-mono);
    font-size: 12px;
    font-weight: 700;
    padding: 7px 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  body.lang-bn .modal-details-btn { font-family: var(--font-bn-body); }

  .modal-cover-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-top: 4px;
    margin-bottom: 8px;
  }
  .modal-side-col {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 14px;
    padding-top: 4px;
  }
  .modal-price-stat {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
  }
  body.lang-bn .modal-price-stat { font-family: var(--font-bn-body); }
  .modal-price-stat b { display: block; color: var(--ink); font-size: 16px; font-weight: 700; margin-top: 2px; }

  .modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--accent-soft);
    color: var(--accent);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    z-index: 2;
  }

  .modal-actions-row {
    margin-top: 20px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    align-items: center;
  }

  /* Cancel the standalone read-excerpt-btn top margin when it sits
     inline in the actions row next to the buy button, so it lines
     up with কিনুন / Buy now instead of sitting lower. */
  .modal-actions-row .read-excerpt-btn { margin-top: 0; }

  .modal-cover {
    width: 150px;
    aspect-ratio: 3/4;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--line);
    box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    margin-bottom: 16px;
  }
  .modal-cover img { width: 100%; height: 100%; object-fit: cover; }

  .modal-title {
    font-family: var(--font-bn-display);
    font-weight: 700;
    font-size: 26px;
  }
  body.lang-en .modal-title { font-family: var(--font-en-sub); }

  .modal-stats {
    margin-top: 16px;
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
  }
  .modal-stat {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }
  body.lang-bn .modal-stat { font-family: var(--font-bn-body); }
  .modal-stat b { display: block; color: var(--ink); font-size: 16px; font-weight: 700; }

  .details-grid {
    margin-top: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 20px;
  }

  .modal-desc {
    margin-top: 20px;
    font-size: 15px;
    line-height: 1.75;
  }

  .excerpt-text {
    margin-top: 18px;
    font-size: 15px;
    line-height: 1.8;
    white-space: pre-line;
  }

  .excerpt-endnote {
    margin-top: 26px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
  }
  .excerpt-endnote p {
    font-size: 14px;
    color: var(--muted);
    margin: 0 0 14px;
  }

  .read-excerpt-btn {
    margin-top: 20px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: none;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    padding: 9px 16px;
    border-radius: 8px;
    cursor: pointer;
  }
  body.lang-bn .read-excerpt-btn { font-family: var(--font-bn-body); }

  .modal-nav {
    margin-top: 26px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid var(--line);
    padding-top: 18px;
  }
  .nav-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
  }
  body.lang-bn .nav-btn { font-family: var(--font-bn-body); }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }

  footer {
    margin-top: 70px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
  }
  .social-row {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .social-row a {
    font-family: var(--font-mono);
    font-size: 13px;
    text-decoration: none;
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 8px 14px;
    border-radius: 20px;
    transition: background .15s ease, color .15s ease;
  }
  .social-row a:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  .footer-bottom {
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--muted);
  }
  body.lang-bn .footer-bottom { font-family: var(--font-bn-body); }

  @media (max-width: 480px) {
    .book { grid-template-columns: 40px 1fr; }
    .book-num { font-size: 26px; }
    .cover { width: 110px; }
    .header-controls { align-items: flex-start; }
  }

  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .buy-btn { transition: none; }
  }
</style>
</head>
<body class="lang-bn" data-theme="light">

<div class="wrap">

  <header class="masthead">
    <div>
      <div class="brand-name" data-bn="~ আসল প্রকাশনী ~" data-en="~ Asol Publication ~">~ আসল প্রকাশনী ~</div>
      <div class="brand-sub" data-bn="লেখকের প্রকাশিত কাজের তালিকা" data-en="A catalog of published works">লেখকের প্রকাশিত কাজের তালিকা</div>
    </div>
    <div class="header-controls">
      <div class="lang-toggle" role="group" aria-label="Language toggle">
        <button type="button" id="btn-bn" class="active">বাং</button>
        <button type="button" id="btn-en">EN</button>
      </div>
      <div class="theme-toggle" role="group" aria-label="Theme toggle">
        <button type="button" id="btn-dark">Dark</button>
        <button type="button" id="btn-light" class="active">Light</button>
      </div>
    </div>
  </header>

  <div class="contact-bar">
    <span data-bn="যোগাযোগ:" data-en="Contact:">যোগাযোগ:</span>
    <strong id="contact-phone"></strong>
  </div>

  <div class="contact-bar" id="contact-email-row" style="display:none;">
    <span data-bn="ইমেইল:" data-en="Email:">ইমেইল:</span>
    <strong id="contact-email"></strong>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="search-input" data-bn-ph="বইয়ের নাম খুঁজুন..." data-en-ph="Search books..." placeholder="বইয়ের নাম খুঁজুন...">
    </div>
    <select class="sort-select" id="sort-select">
      <option value="order" data-bn="লেখকের দেওয়া ক্রম" data-en="Author's order">লেখকের দেওয়া ক্রম</option>
      <option value="alpha" data-bn="বর্ণানুক্রমিক (A-Z)" data-en="Alphabetical (A-Z)">বর্ণানুক্রমিক (A-Z)</option>
      <option value="date" data-bn="প্রকাশের তারিখ" data-en="Publish date">প্রকাশের তারিখ</option>
    </select>
  </div>

  <div class="filter-chips" id="filter-chips"></div>

  <div class="index-label" data-bn="লেখনসমূহ" data-en="Writings">লেখনসমূহ</div>

  <div id="book-list"></div>

  <footer>
    <div class="social-row" id="social-row"></div>
    <div class="footer-bottom">
      <span data-bn="~ আসল প্রকাশনী ~" data-en="~ Asol Publication ~">~ আসল প্রকাশনী ~</span>
      <span id="footer-contact"></span>
    </div>
  </footer>

</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-back" id="modal-back" style="display:none;">← <span data-bn="ফিরে" data-en="Back">ফিরে</span></button>
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-body"></div>
    <div class="modal-nav" id="modal-nav-row">
      <button class="nav-btn" id="modal-prev">← <span data-bn="আগের" data-en="Previous">আগের</span></button>
      <button class="nav-btn" id="modal-next"><span data-bn="পরের" data-en="Next">পরের</span> →</button>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // Contact info, phone numbers, and social links now live in
  // data/contact.json — nothing to edit in this file for those.
  // ============================================================

  let CONTACT = { phones: [], emails: [], whatsappDefault: '', telegramAuthorLink: '', socialLinks: [] };

  async function loadContact() {
    try {
      CONTACT = await fetch('data/contact.json').then(r => {
        if (!r.ok) throw new Error('data/contact.json not found');
        return r.json();
      });
    } catch (e) {
      console.error('Could not load data/contact.json', e);
    }
  }

  // ============================================================
  // App logic — no need to edit below this line
  // ============================================================

  let BOOKS = [];
  let lang = 'bn';
  let sortMode = 'order';
  let searchQuery = '';
  let activeType = null;
  let modalIndex = null;
  let modalScreen = 'preview';
  let visibleList = [];

  const bnDigits = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
  function toBnDigits(str) { return String(str).replace(/[0-9]/g, d => bnDigits[d]); }

  function parseDMY(str) {
    if (!str) return null;
    const [d, m, y] = str.split('-').map(Number);
    if (!d || !m || !y) return null;
    return new Date(y, m - 1, d).getTime();
  }

  async function loadData() {
    let manifest = [];
    try {
      manifest = await fetch('data/manifest.json').then(r => r.json());
    } catch (e) {
      console.error('Could not load data/manifest.json', e);
    }

    const results = await Promise.allSettled(
      manifest.map(async id => {
        const book = await fetch(`data/books/${id}.json`).then(r => {
          if (!r.ok) throw new Error(`data/books/${id}.json not found`);
          return r.json();
        });

        // Optional: excerpt text loaded from a separate .txt file instead
        // of being written inline in the JSON — better for long text.
        if (book.excerptFile) {
          book._excerptText = {};
          for (const l of ['bn', 'en']) {
            const path = book.excerptFile[l];
            if (!path) continue;
            try {
              const text = await fetch(path).then(r => {
                if (!r.ok) throw new Error(`${path} not found`);
                return r.text();
              });
              book._excerptText[l] = text;
            } catch (e) {
              console.error(`Could not load excerpt file for "${id}" (${l}):`, e);
              book._excerptText[l] = '';
            }
          }
        }

        return book;
      })
    );

    BOOKS = [];
    results.forEach((res, idx) => {
      if (res.status === 'fulfilled') {
        const b = res.value;
        const d = b.description || {};
        const excerpt = b._excerptText
          ? {
              bn: b._excerptText.bn || (d.excerpt && d.excerpt.bn) || '',
              en: b._excerptText.en || (d.excerpt && d.excerpt.en) || ''
            }
          : (d.excerpt || { bn: '', en: '' });
        BOOKS.push({
          id: b.id || manifest[idx],
          order: b.order || 0,
          title: b.title || { bn: '', en: '' },
          type: b.type || { bn: '', en: '' },
          price: b.price || 0,
          whatsapp: b.whatsapp || '',
          cover: b.cover || '',
          dates: b.dates || {},
          desc: {
            short: d.short || { bn: '', en: '' },
            full: d.full || { bn: '', en: '' },
            excerpt: excerpt,
            pages: d.pages || 0,
            chapters: d.chapters || 0,
            sold: d.sold || 0,
            continuous: !!d.continuous
          }
        });
      } else {
        // A mistake in one book's file only skips that book —
        // it won't break the rest of the site. Check the browser
        // console for which file failed and why.
        console.error(`Skipped book "${manifest[idx]}":`, res.reason);
      }
    });

    renderFilterChips();
    renderAll();
  }

  function renderFilterChips() {
    const seen = new Map();
    BOOKS.forEach(b => { if (!seen.has(b.type.bn)) seen.set(b.type.bn, b.type); });

    const container = document.getElementById('filter-chips');
    const allLabel = lang === 'bn' ? 'সব' : 'All';

    let html = `<button class="filter-chip${activeType === null ? ' active' : ''}" data-type="">${allLabel}</button>`;
    seen.forEach((typeObj, key) => {
      html += `<button class="filter-chip${activeType === key ? ' active' : ''}" data-type="${key}">${typeObj[lang]}</button>`;
    });
    container.innerHTML = html;

    container.querySelectorAll('.filter-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        activeType = btn.dataset.type || null;
        renderFilterChips();
        renderList();
      });
    });
  }

  function getFiltered() {
    let list = [...BOOKS];

    if (activeType) {
      list = list.filter(b => b.type.bn === activeType);
    }

    if (searchQuery.trim()) {
      const q = searchQuery.trim().toLowerCase();
      list = list.filter(b =>
        b.title.bn.toLowerCase().includes(q) || b.title.en.toLowerCase().includes(q)
      );
    }

    if (sortMode === 'alpha') {
      list.sort((a, b) => a.title[lang].localeCompare(b.title[lang], lang === 'bn' ? 'bn' : 'en'));
    } else if (sortMode === 'date') {
      list.sort((a, b) => {
        const da = parseDMY(a.dates.published);
        const db = parseDMY(b.dates.published);
        if (da === null && db === null) return 0;
        if (da === null) return 1;
        if (db === null) return -1;
        return db - da;
      });
    } else {
      list.sort((a, b) => (a.order || 0) - (b.order || 0));
    }

    return list;
  }

  function fmtDate(dateStr) {
    if (!dateStr) return null;
    return lang === 'bn' ? toBnDigits(dateStr) : dateStr;
  }

  function buildWhatsappLink(book) {
    const number = (book.whatsapp && book.whatsapp.trim()) || CONTACT.whatsappDefault;
    const msg = encodeURIComponent(
      (lang === 'bn' ? 'আমি "' : 'I want to order "') + book.title[lang] + (lang === 'bn' ? '" বইটি কিনতে চাই।' : '".')
    );
    return `https://wa.me/${number}?text=${msg}`;
  }

  function renderList() {
    visibleList = getFiltered();
    const container = document.getElementById('book-list');
    container.innerHTML = '';

    if (visibleList.length === 0) {
      container.innerHTML = `<div class="empty-state">${lang === 'bn' ? 'কোনো বই পাওয়া যায়নি' : 'No books found'}</div>`;
      return;
    }

    visibleList.forEach((book, i) => {
      const num = String(i + 1).padStart(2, '0');
      const hasCover = !!book.cover;

      const pub = fmtDate(book.dates.published);
      const st = fmtDate(book.dates.started);
      const en = fmtDate(book.dates.ended);
      const ed = fmtDate(book.dates.edited);
      const sold = lang === 'bn' ? toBnDigits(book.desc.sold) : book.desc.sold;

      const metaLines = [];
      if (st) metaLines.push(`<div class="meta-item">${lang==='bn'?'শুরু':'Started'}: <b>${st}</b></div>`);
      if (en) metaLines.push(`<div class="meta-item">${lang==='bn'?'শেষ':'Ended'}: <b>${en}</b></div>`);
      if (ed) metaLines.push(`<div class="meta-item">${lang==='bn'?'সম্পাদনা':'Edited'}: <b>${ed}</b></div>`);
      if (pub) metaLines.push(`<div class="meta-item">${lang==='bn'?'প্রকাশ':'Published'}: <b>${pub}</b></div>`);
      metaLines.push(`<div class="meta-item">${lang==='bn'?'বিক্রি হয়েছে':'Sold copies'}: <b>${sold}</b></div>`);

      const coverHtml = hasCover
        ? `<div class="cover" data-open="${book.id}"><img src="${book.cover}" alt="${book.title[lang]}"></div>`
        : `<div class="cover placeholder">${lang === 'bn' ? 'কভার শীঘ্রই' : 'Cover coming soon'}</div>`;

      const priceHtml = book.price > 0
        ? `<div class="price">${lang === 'bn' ? toBnDigits(book.price) : book.price}<span class="unit">${lang === 'bn' ? ' টাকা' : ' BDT'}</span></div>`
        : '';

      const actionHtml = book.price > 0
        ? `<a class="buy-btn" href="${buildWhatsappLink(book)}" target="_blank" rel="noopener">${lang === 'bn' ? 'কিনুন' : 'Buy now'} →</a>`
        : `<span class="status-pill">${lang === 'bn' ? 'শীঘ্রই আসছে' : 'Coming soon'}</span>`;

      const el = document.createElement('div');
      el.className = 'book' + (hasCover ? ' has-cover' : '');
      el.innerHTML = `
        <div class="book-num-wrap">
          <span class="book-num">${num}</span>
          <div class="book-code">${book.id}</div>
        </div>
        <div style="grid-column: 2;">
          <div class="book-title-row" data-open="${book.id}">
            <div class="book-type">${book.type[lang]}</div>
            <div class="book-title">${book.title[lang]}</div>
          </div>
          <div class="book-top-row">
            ${coverHtml}
            <div class="meta-col">${metaLines.join('')}</div>
          </div>
          <p class="book-desc" style="margin-top:16px;">${book.desc.short[lang]}</p>
          <button class="read-more" data-open="${book.id}">${lang==='bn'?'পুরোটা পড়ুন →':'Read more →'}</button>
          <div class="book-footer">
            ${priceHtml}
            ${actionHtml}
          </div>
        </div>
      `;
      container.appendChild(el);
    });

    container.querySelectorAll('[data-open]').forEach(node => {
      node.addEventListener('click', () => openModal(node.dataset.open));
    });
  }

  function openModal(id) {
    modalIndex = visibleList.findIndex(b => b.id === id);
    modalScreen = 'preview';
    renderModal();
    document.getElementById('modal-overlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('open');
    modalIndex = null;
    modalScreen = 'preview';
  }

  function renderModal() {
    if (modalIndex === null || !visibleList[modalIndex]) return;
    const book = visibleList[modalIndex];

    const backBtn = document.getElementById('modal-back');
    const navRow = document.getElementById('modal-nav-row');
    const body = document.getElementById('modal-body');

    backBtn.style.display = modalScreen === 'preview' ? 'none' : 'inline-block';
    navRow.style.display = modalScreen === 'preview' ? 'flex' : 'none';
    body.style.marginTop = modalScreen === 'preview' ? '0' : '38px';

    const coverHtml = book.cover
      ? `<div class="modal-cover"><img src="${book.cover}" alt="${book.title[lang]}"></div>`
      : '';

    if (modalScreen === 'preview') {
      const stats = [];
      if (book.desc.pages > 0) stats.push({ label: lang==='bn'?'পৃষ্ঠা':'Pages', value: lang==='bn'?toBnDigits(book.desc.pages):book.desc.pages });
      if (book.desc.chapters > 0) stats.push({ label: lang==='bn'?'অধ্যায়':'Chapters', value: lang==='bn'?toBnDigits(book.desc.chapters):book.desc.chapters });
      stats.push({ label: lang==='bn'?'বিক্রি হয়েছে':'Sold', value: lang==='bn'?toBnDigits(book.desc.sold):book.desc.sold });
      if (book.dates.published) stats.push({ label: lang==='bn'?'প্রকাশ':'Published', value: fmtDate(book.dates.published) });

      const priceStatHtml = book.price > 0
        ? `<div class="modal-price-stat">${lang==='bn'?'মূল্য':'Price'}<b>${lang==='bn'?toBnDigits(book.price)+' টাকা':book.price+' BDT'}</b></div>`
        : '';

      const buyBtnHtml = book.price > 0
        ? `<a class="buy-btn" href="${buildWhatsappLink(book)}" target="_blank" rel="noopener">${lang==='bn'?'কিনুন':'Buy now'} →</a>`
        : `<span class="status-pill">${lang==='bn'?'শীঘ্রই আসছে':'Coming soon'}</span>`;

      body.innerHTML = `
        <div class="modal-cover-row">
          ${coverHtml}
          <div class="modal-side-col">
            ${priceStatHtml}
            <button class="modal-details-btn" data-action="details">${lang==='bn'?'বিস্তারিত →':'Details →'}</button>
          </div>
        </div>
        <div class="book-type">${book.type[lang]}</div>
        <div class="modal-title">${book.title[lang]}</div>
        <div class="modal-stats">${stats.map(s => `<div class="modal-stat">${s.label}<b>${s.value}</b></div>`).join('')}</div>
        <div class="modal-desc">${book.desc.full[lang]}</div>
        <div class="modal-actions-row">
          <button class="read-excerpt-btn" data-action="excerpt">${lang==='bn'?'আংশিক পড়ুন':'Read excerpt'} →</button>
          ${buyBtnHtml}
        </div>
      `;
    } else if (modalScreen === 'details') {
      const continuous = book.desc.continuous
        ? (lang==='bn'?'হ্যাঁ, ধারাবাহিক':'Yes, ongoing series')
        : (lang==='bn'?'না, সম্পূর্ণ বই':'No, complete book');

      const grid = [
        { label: lang==='bn'?'ধরন':'Type', value: book.type[lang] },
        book.desc.pages > 0 ? { label: lang==='bn'?'পৃষ্ঠা':'Pages', value: lang==='bn'?toBnDigits(book.desc.pages):book.desc.pages } : null,
        book.desc.chapters > 0 ? { label: lang==='bn'?'অধ্যায়':'Chapters', value: lang==='bn'?toBnDigits(book.desc.chapters):book.desc.chapters } : null,
        book.price > 0 ? { label: lang==='bn'?'মূল্য':'Price', value: (lang==='bn'?toBnDigits(book.price)+' টাকা':book.price+' BDT') } : null,
        { label: lang==='bn'?'ধারাবাহিকতা':'Continuity', value: continuous },
        { label: lang==='bn'?'বিক্রি হয়েছে':'Sold copies', value: lang==='bn'?toBnDigits(book.desc.sold):book.desc.sold },
        book.dates.published ? { label: lang==='bn'?'প্রকাশ':'Published', value: fmtDate(book.dates.published) } : null,
        book.dates.started ? { label: lang==='bn'?'শুরু':'Started', value: fmtDate(book.dates.started) } : null,
        book.dates.ended ? { label: lang==='bn'?'শেষ':'Ended', value: fmtDate(book.dates.ended) } : null,
        book.dates.edited ? { label: lang==='bn'?'সম্পাদনা':'Edited', value: fmtDate(book.dates.edited) } : null,
      ].filter(Boolean);

      body.innerHTML = `
        ${coverHtml}
        <div class="book-type">${book.type[lang]}</div>
        <div class="modal-title">${book.title[lang]}</div>
        <div class="details-grid">${grid.map(s => `<div class="modal-stat">${s.label}<b>${s.value}</b></div>`).join('')}</div>
        <div class="modal-desc">${book.desc.full[lang]}</div>
        <button class="read-excerpt-btn" data-action="excerpt">${lang==='bn'?'আংশিক পড়ুন':'Read excerpt'} →</button>
      `;
    } else if (modalScreen === 'excerpt') {
      const excerptText = (book.desc.excerpt && book.desc.excerpt[lang])
        ? book.desc.excerpt[lang]
        : (lang==='bn' ? 'এই বইয়ের অংশ শীঘ্রই যুক্ত হবে।' : 'An excerpt for this book will be added soon.');

      body.innerHTML = `
        <div class="book-type">${book.type[lang]}</div>
        <div class="modal-title">${book.title[lang]}</div>
        <div class="excerpt-text">${excerptText}</div>
        <div class="excerpt-endnote">
          <p>${lang==='bn' ? 'সম্পূর্ণ বইটি পড়তে লেখকের সাথে যোগাযোগ করুন।' : 'To read the full book, message the author directly.'}</p>
          <a class="buy-btn" href="${CONTACT.telegramAuthorLink}" target="_blank" rel="noopener">${lang==='bn' ? 'লেখকের সাথে যোগাযোগ' : 'Message the author'} →</a>
        </div>
      `;
    }

    document.getElementById('modal-prev').disabled = modalIndex <= 0;
    document.getElementById('modal-next').disabled = modalIndex >= visibleList.length - 1;
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', e => {
    if (e.target.id === 'modal-overlay') closeModal();
  });
  document.getElementById('modal-back').addEventListener('click', () => { modalScreen = 'preview'; renderModal(); });
  document.getElementById('modal-body').addEventListener('click', e => {
    if (e.target.closest('[data-action="details"]')) { modalScreen = 'details'; renderModal(); return; }
    if (e.target.closest('[data-action="excerpt"]')) { modalScreen = 'excerpt'; renderModal(); }
  });
  document.getElementById('modal-prev').addEventListener('click', () => { if (modalIndex > 0) { modalIndex--; modalScreen = 'preview'; renderModal(); } });
  document.getElementById('modal-next').addEventListener('click', () => { if (modalIndex < visibleList.length - 1) { modalIndex++; modalScreen = 'preview'; renderModal(); } });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('modal-overlay').classList.contains('open')) return;
    if (e.key === 'Escape') closeModal();
    if (e.key === 'ArrowLeft' && modalIndex > 0) { modalIndex--; modalScreen = 'preview'; renderModal(); }
    if (e.key === 'ArrowRight' && modalIndex < visibleList.length - 1) { modalIndex++; modalScreen = 'preview'; renderModal(); }
  });

  function renderSocial() {
    const row = document.getElementById('social-row');
    row.innerHTML = (CONTACT.socialLinks || []).filter(s => s.url).map(s =>
      `<a href="${s.url}" target="_blank" rel="noopener">${s.label}</a>`
    ).join('');
  }

  function renderAll() {
    document.querySelectorAll('[data-bn]').forEach(node => {
      node.textContent = node.dataset[lang];
    });

    const searchInput = document.getElementById('search-input');
    searchInput.placeholder = searchInput.dataset[lang + 'Ph'];

    const phonesText = (CONTACT.phones || []).join('  ·  ');
    document.getElementById('contact-phone').textContent = phonesText;
    document.getElementById('footer-contact').textContent = phonesText;

    const emailRow = document.getElementById('contact-email-row');
    if (CONTACT.emails && CONTACT.emails.length) {
      emailRow.style.display = 'flex';
      document.getElementById('contact-email').textContent = CONTACT.emails.join('  ·  ');
    } else {
      emailRow.style.display = 'none';
    }

    renderFilterChips();
    renderList();
    if (modalIndex !== null) renderModal();
  }

  document.getElementById('btn-bn').addEventListener('click', () => {
    lang = 'bn';
    document.body.className = 'lang-bn';
    document.documentElement.lang = 'bn';
    document.getElementById('btn-bn').classList.add('active');
    document.getElementById('btn-en').classList.remove('active');
    renderAll();
  });
  document.getElementById('btn-en').addEventListener('click', () => {
    lang = 'en';
    document.body.className = 'lang-en';
    document.documentElement.lang = 'en';
    document.getElementById('btn-en').classList.add('active');
    document.getElementById('btn-bn').classList.remove('active');
    renderAll();
  });

  document.getElementById('btn-dark').addEventListener('click', () => {
    document.body.setAttribute('data-theme', 'dark');
    document.getElementById('btn-dark').classList.add('active');
    document.getElementById('btn-light').classList.remove('active');
  });
  document.getElementById('btn-light').addEventListener('click', () => {
    document.body.setAttribute('data-theme', 'light');
    document.getElementById('btn-light').classList.add('active');
    document.getElementById('btn-dark').classList.remove('active');
  });

  document.getElementById('search-input').addEventListener('input', e => {
    searchQuery = e.target.value;
    renderList();
  });

  document.getElementById('sort-select').addEventListener('change', e => {
    sortMode = e.target.value;
    renderList();
  });

  async function init() {
    await loadContact();
    renderSocial();
    await loadData();
  }
  init();
</script>
</body>
</html>
